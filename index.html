<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Layanan Persuratan Digital</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100%;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#f1f3f4;
      overflow:hidden;
      font-family:Arial, sans-serif;
    }

    .iframe-container{
      width:100%;
      max-width:1400px;
      height:100vh;
      padding:10px;
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
      border-radius:12px;
      background:white;
      box-shadow:0 4px 15px rgba(0,0,0,0.15);
    }

    /* Tampilan laptop / desktop */
    @media (min-width: 1024px){
      .iframe-container{
        width:90%;
        height:95vh;
      }
    }

    /* Tampilan HP */
    @media (max-width: 768px){
      .iframe-container{
        width:100%;
        height:100vh;
        padding:0;
      }

      iframe{
        border-radius:0;
      }
    }
  </style>
</head>

<body>

  <div class="iframe-container">
    <iframe 
      src="https://script.google.com/macros/s/AKfycbz2IqrmzCn8Dorb1Fu7GaiiPxRspOrmL2i9XHVitJrXYirpsHWcqK8hS9jI8SAGldE/exec"
      allow="camera; microphone; fullscreen">
    </iframe>
  </div>

</body>
</html>
