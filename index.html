<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Layanan Persuratan Digital</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f5f5f5;
    }

    .wrapper {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    iframe {
      width: 125%;
      height: 125%;
      border: none;

      /* Mengecilkan tampilan isi */
      transform: scale(0.8);
      transform-origin: top left;
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <iframe 
      src="https://script.google.com/macros/s/AKfycbz2IqrmzCn8Dorb1Fu7GaiiPxRspOrmL2i9XHVitJrXYirpsHWcqK8hS9jI8SAGldE/exec"
      allow="camera; microphone; fullscreen">
    </iframe>
  </div>

</body>
</html>
